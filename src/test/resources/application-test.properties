# In-memory H2 for fast, isolated tests
spring.datasource.url=jdbc:h2:mem:civicdesk_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Override the MySQL dialect inherited from the default application.properties,
# otherwise Hibernate emits MySQL DDL against H2 and no tables get created.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT — short-lived test token, BCrypt cost 4 (configured in test SecurityConfig)
app.jwt.secret=test_secret_key_minimum_32_characters_ok
app.jwt.expiry=1800000

# MockMvc dispatches at the servlet root; keep context-path empty in tests so
# test URLs are the controller-relative paths (e.g. /auth/register).
server.servlet.context-path=
