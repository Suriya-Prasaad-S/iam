spring.application.name=civicdesk-iam

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Keep column names exactly as declared (camelCase) instead of converting to snake_case.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required
app.jwt.expiry=1800000

# Default admin seeded by DataSeeder on startup.
# Each value is read from an OS environment variable, with a local-dev default
# after the colon. Export ADMIN_* in real environments to override.
app.admin.email=${ADMIN_EMAIL:admin@civicdesk.gov}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.name=${ADMIN_NAME:System Administrator}
app.admin.phone=${ADMIN_PHONE:9999999999}

# Server
server.port=8081
server.servlet.context-path=/civicDesk/iam
