# Production overrides (activate with --spring.profiles.active=prod)
# Schema is managed by migrations; only validate the mapping, never auto-create.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# Secrets must come from the environment in production — no defaults here.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
app.jwt.secret=${JWT_SECRET}
